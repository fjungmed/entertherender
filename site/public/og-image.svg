<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A4828"/>
      <stop offset="60%" stop-color="#2D3A1E"/>
      <stop offset="100%" stop-color="#1E2814"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#4A5A33" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Scanlines -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="4" fill="none" stroke="#4A5A33" stroke-width="2" opacity="0.5"/>

  <!-- Top left label -->
  <text x="48" y="56" font-family="monospace" font-size="11" fill="#6B7F4A" letter-spacing="3" opacity="0.6">ARCHVIZ STUDIO</text>

  <!-- Top right status -->
  <circle cx="1112" cy="48" r="4" fill="#8B2D2D"/>
  <text x="1070" y="52" font-family="monospace" font-size="10" fill="#8B2D2D" letter-spacing="2" text-anchor="end">ONLINE</text>

  <!-- Logo [ETR] -->
  <text x="600" y="280" font-family="monospace" font-weight="bold" font-size="140" text-anchor="middle" letter-spacing="8">
    <tspan fill="#8B2D2D" opacity="0.7">[</tspan><tspan fill="#C4963A">E</tspan><tspan fill="#F5F0E8">T</tspan><tspan fill="#F5F0E8">R</tspan><tspan fill="#8B2D2D" opacity="0.7">]</tspan>
  </text>

  <!-- Full name -->
  <text x="600" y="330" font-family="monospace" font-size="18" fill="#6B7F4A" text-anchor="middle" letter-spacing="14" font-weight="bold">ENTER THE RENDER</text>

  <!-- Tagline -->
  <text x="600" y="400" font-family="monospace" font-size="13" fill="#C4963A" text-anchor="middle" letter-spacing="6">BUILDING WORLDS. RENDERING FUTURES.</text>

  <!-- Bottom line -->
  <line x1="440" y1="440" x2="760" y2="440" stroke="#4A5A33" stroke-width="1" opacity="0.4"/>

  <!-- Tech stack -->
  <text x="600" y="480" font-family="monospace" font-size="10" fill="#8B9A6B" text-anchor="middle" letter-spacing="3" opacity="0.5">UNREAL ENGINE 5 · 3DS MAX · AI GENERATIVA · REAL-TIME</text>

  <!-- Bottom bar -->
  <rect x="20" y="580" width="1160" height="30" rx="0" fill="rgba(0,0,0,0.2)"/>
  <text x="48" y="600" font-family="monospace" font-size="9" fill="#4A5A33" letter-spacing="2">entertherender.com</text>
  <text x="1152" y="600" font-family="monospace" font-size="9" fill="#4A5A33" letter-spacing="2" text-anchor="end">© 2026 [ETR]</text>
</svg>
